version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventify-postgres-prod
    environment:
      POSTGRES_DB: eventify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventify_db"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - eventify-network-prod

  backend:
    build:
      context: ./eventify-backend
      dockerfile: eventify-template/eventify-backend/src/main/java/com/eventify/eventify_backend/Dockerfile
    container_name: eventify-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventify_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    restart: always
    networks:
      - eventify-network-prod

  frontend:
    build:
      context: ./booking-ui
      dockerfile: eventify-template/eventify-backend/Dockerfile
    container_name: eventify-frontend-prod
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: always
    networks:
      - eventify-network-prod

networks:
  eventify-network-prod:
    driver: bridge

volumes:
  postgres_data_prod: