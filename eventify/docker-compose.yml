
services:
  postgres:
    image: postgres:15-alpine
    container_name: eventify-postgres
    environment:
      POSTGRES_DB: eventify_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventify-network

  backend:
    build:
      context: ./eventify-backend
      dockerfile: eventify-backend/build/Dockerfile
    container_name: eventify-backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventify_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8081:8080"
    networks:
      - eventify-network

  frontend:
    build:
      context: ./booking-ui
      dockerfile: eventify-template/eventify-backend/Dockerfile
    container_name: eventify-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eventify-network

networks:
  eventify-network:
    driver: bridge

volumes:
  postgres_data: