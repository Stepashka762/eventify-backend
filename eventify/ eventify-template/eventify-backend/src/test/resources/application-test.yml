spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  liquibase:
    enabled: false
  sql:
    init:
      mode: always

jwt:
  secret: testSecretKeyForUnitTestsOnly12345678901234567890
  expiration: 3600000

logging:
  level:
    com.eventify.eventify_backend: DEBUG